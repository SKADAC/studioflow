<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudioFlow - Clientes</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <h2>StudioFlow</h2>
        <p>Gestão do estúdio</p>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="clientes.html" class="nav-link active">Clientes</a>
        <a href="profissionais.html" class="nav-link">Profissionais</a>
        <a href="servicos.html" class="nav-link">Serviços</a>
        <a href="agendamentos.html" class="nav-link">Agendamentos</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="page-header">
        <div>
          <h1>Clientes</h1>
          <p>Cadastre e gerencie os clientes do StudioFlow</p>
        </div>
      </header>

      <section class="card form-card">
        <h2>Novo cliente</h2>

        <form id="formCliente" class="form-grid">
          <div class="form-group">
            <label for="nomeCliente">Nome</label>
            <input type="text" id="nomeCliente" placeholder="Digite o nome" required />
          </div>

          <div class="form-group">
            <label for="telefoneCliente">Telefone</label>
            <input type="tel" id="telefoneCliente" placeholder="(54) 99999-9999" required />
          </div>

          <div class="form-group">
            <label for="emailCliente">E-mail</label>
            <input type="email" id="emailCliente" placeholder="cliente@email.com" />
          </div>

          <div class="form-group">
            <label for="observacaoCliente">Observações</label>
            <input type="text" id="observacaoCliente" placeholder="Ex: prefere atendimento à tarde" />
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-primary">Salvar cliente</button>
          </div>
        </form>
      </section>

      <section class="card list-card">
        <div class="section-title">
          <h2>Lista de clientes</h2>
          <span id="contadorClientes" class="badge-count">0 clientes</span>
        </div>

        <div id="listaClientes" class="client-list"></div>
      </section>
    </main>
  </div>

  <script src="js/clientes.js"></script>
</body>
</html>
